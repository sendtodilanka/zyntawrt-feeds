name: Validate Packages

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  validate:
    name: Validate package structure
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}

      - name: Check package Makefiles
        run: |
          ERRORS=0
          CHECKED=0

          while IFS= read -r -d '' makefile; do
            CHECKED=$((CHECKED + 1))
            if ! grep -q "PKG_NAME" "$makefile"; then
              echo "FAIL: Missing PKG_NAME in $makefile"
              ERRORS=$((ERRORS + 1))
            fi
            if ! grep -q "PKG_VERSION\|PKG_RELEASE" "$makefile"; then
              echo "FAIL: Missing PKG_VERSION/PKG_RELEASE in $makefile"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find feeds -mindepth 3 -maxdepth 3 -name "Makefile" -print0 2>/dev/null)

          echo "Checked $CHECKED Makefiles, $ERRORS error(s)"
          [ "$ERRORS" -eq 0 ] || exit 1

      - name: Check for broken symlinks
        run: |
          broken=$(find feeds/ -xtype l 2>/dev/null || true)
          if [ -n "$broken" ]; then
            echo "Broken symlinks:"
            echo "$broken"
            exit 1
          fi
          echo "No broken symlinks"

      - name: Verify feed structure
        run: |
          for feed_dir in feeds/*/; do
            [ -d "$feed_dir" ] || continue
            feed_name=$(basename "$feed_dir")
            count=$(find "$feed_dir" -name "Makefile" -mindepth 2 -maxdepth 2 2>/dev/null | wc -l)
            echo "Feed '$feed_name': $count package(s)"
          done
          echo "All feeds validated"
