name: Monitor Upstream

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check upstream HEADs
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          UPSTREAMS=(
            "4IceG/luci-app-3ginfo-lite"
            "jerrykuku/luci-theme-argon"
            "jerrykuku/luci-app-argon-config"
            "immortalwrt/homeproxy"
            "rufengsuixing/luci-app-adguardhome"
            "vernesong/OpenClash"
            "Openwrt-Passwall/openwrt-passwall"
            "Openwrt-Passwall/openwrt-passwall-packages"
            "Openwrt-Passwall/openwrt-passwall2"
            "FUjr/modem_feeds"
          )

          SHA_FILE=".github/upstream-shas.json"
          [ -f "$SHA_FILE" ] || echo '{}' > "$SHA_FILE"
          OLD_SHAS=$(cat "$SHA_FILE")

          NEW_SHAS="{}"
          CHANGED=false

          for repo in "${UPSTREAMS[@]}"; do
            SHA=$(curl -sL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${repo}/commits/HEAD" \
              | jq -r '.sha // "unknown"')

            OLD_SHA=$(echo "$OLD_SHAS" | jq -r --arg r "$repo" '.[$r] // ""')
            NEW_SHAS=$(echo "$NEW_SHAS" | jq --arg r "$repo" --arg s "$SHA" '.[$r] = $s')

            if [ "$SHA" != "$OLD_SHA" ]; then
              echo "Changed: $repo"
              echo "  old: $OLD_SHA"
              echo "  new: $SHA"
              CHANGED=true
            else
              echo "No change: $repo ($SHA)"
            fi
          done

          echo "$NEW_SHAS" | jq . > "$SHA_FILE"
          echo "changed=$CHANGED" >> "$GITHUB_OUTPUT"

      - name: Commit updated SHAs
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git add .github/upstream-shas.json
          git diff --cached --quiet || git commit -m "Monitor: upstream SHAs updated $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push origin HEAD:${{ github.ref_name }}

      - name: Trigger sync workflow
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -sL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/sendtodilanka/zyntawrt-feeds/actions/workflows/sync.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Sync triggered"
