name: Sync Packages

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 2 AM UTC
  push:
    branches: [main]
    paths:
      - 'scripts/sync/**'
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force sync even if no changes'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git config core.autocrlf false

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/sync/*.sh

      - name: Sync all packages
        env:
          GITHUB_TOKEN: ${{ secrets.PAT }}
        run: bash scripts/run-sync-all.sh

      - name: Detect changes
        id: changes
        run: |
          changed=$(git status --porcelain | wc -l | tr -d ' ')
          if [ "$changed" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$changed file(s) changed:"
            git status --short | head -30
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true' || github.event.inputs.force_sync == 'true'
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S')
          git add .
          git commit -m "Sync: ${TIMESTAMP} UTC"
          git push origin HEAD:main

      - name: Trigger firmware build
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          curl -sfL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/sendtodilanka/ZyntaWRT/dispatches" \
            -d '{"event_type":"feeds-updated"}'
          echo "ZyntaWRT build triggered"
