name: Sync Packages

on:
  schedule:
    - cron: '0 2 * * *'   # Daily at 2 AM UTC
  push:
    branches: [main]
    paths:
      - 'scripts/sync/**'
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force sync even if no changes'
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name  "GitHub Actions"
          git config user.email "actions@github.com"
          git config core.autocrlf false

      - name: Make scripts executable
        run: chmod +x scripts/*.sh scripts/sync/*.sh

      - name: Sync all packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: bash scripts/run-sync-all.sh

      - name: Detect changes
        id: changes
        run: |
          changed=$(git status --porcelain | wc -l | tr -d ' ')
          if [ "$changed" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "$changed file(s) changed:"
            git status --short | head -30
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected"
          fi

      - name: Create PR with package updates
        if: steps.changes.outputs.changed == 'true' || github.event.inputs.force_sync == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIMESTAMP=$(date -u '+%Y%m%d-%H%M')
          DATE=$(date -u '+%Y-%m-%d')
          SYNC_BRANCH="sync/${TIMESTAMP}"

          git checkout -b "$SYNC_BRANCH"
          git add .
          git commit -m "Sync: upstream packages ${DATE}"
          git push origin "$SYNC_BRANCH"

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --title "Sync: upstream packages ${DATE}" \
            --body "Automated upstream sync. Auto-merges after **Validate Packages** CI passes." \
            --base main \
            --head "$SYNC_BRANCH"

          echo "PR created: $SYNC_BRANCH"
