name: Auto Merge PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  enable-auto-merge:
    name: Enable auto-merge
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --auto \
            --squash || echo "Auto-merge already enabled or branch protection not configured"
